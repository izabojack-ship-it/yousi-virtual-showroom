{% extends "base.html" %}
{% block title %}會員註冊 — {{ site.name }}{% endblock %}
{% block content %}
<section class="section">
  <div class="container" style="max-width:480px;">
    <h1 style="text-align:center;margin-bottom:24px;">會員註冊</h1>
    <p style="text-align:center;color:#64748b;margin-bottom:20px;">經銷商與客戶可註冊帳號，查看諮詢紀錄</p>
    {% if error %}<p style="color:#c62828;text-align:center;">{{ error }}</p>{% endif %}
    <form method="post" class="member-form">
      {% csrf_token %}
      <label>帳號 *<input type="text" name="username" required></label>
      <label>Email *<input type="email" name="email" required></label>
      <label>公司<input type="text" name="company"></label>
      <label>電話<input type="tel" name="phone"></label>
      <label>密碼 *<input type="password" name="password" required></label>
      <label>確認密碼 *<input type="password" name="password2" required></label>
      <button type="submit" class="btn btn-primary" style="width:100%;margin-top:12px;">註冊</button>
    </form>
    <p style="text-align:center;margin-top:16px;font-size:14px;">
      已有帳號？<a href="{% url 'member_login' %}">登入</a>
    </p>
  </div>
</section>
{% endblock %}
