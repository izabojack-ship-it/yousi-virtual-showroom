services:
  web:
    build: .
    ports:
      - "9000:9000"
    env_file:
      - .env.production
    environment:
      BEHIND_PROXY: "True"
      SERVE_MEDIA: "True"
      SECURE_SSL_REDIRECT: "False"
    volumes:
      - ./media:/app/media
      - ./db.sqlite3:/app/db.sqlite3
    restart: unless-stopped
